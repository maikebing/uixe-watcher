name: publish-agent

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  NUGET_XMLDOC_MODE: skip

jobs:
  publish-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish Windows AOT
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\artifacts" | Out-Null
          $output = Join-Path $env:GITHUB_WORKSPACE "artifacts\uixe-copilot-agent-win-x64"
          dotnet restore src/Uixe.Copilot.Agent/Uixe.Copilot.Agent.csproj -r win-x64
          dotnet publish src/Uixe.Copilot.Agent/Uixe.Copilot.Agent.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishAot=true `
            -o $output

      - name: Archive Windows artifact
        shell: pwsh
        run: |
          $archive = Join-Path $env:GITHUB_WORKSPACE "artifacts\uixe-copilot-agent-win-x64.zip"
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\artifacts\uixe-copilot-agent-win-x64\*" -DestinationPath $archive -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: uixe-copilot-agent-win-x64
          path: artifacts/uixe-copilot-agent-win-x64.zip
          if-no-files-found: error

      - name: Attach Windows release asset
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} artifacts/uixe-copilot-agent-win-x64.zip --clobber

  publish-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: uixe-copilot-agent-ubuntu-22.04-x64
            archive_name: uixe-copilot-agent-ubuntu-22.04-x64.tar.gz
            container_image: ubuntu:22.04
            install_script: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y software-properties-common ca-certificates gnupg clang zlib1g-dev
              add-apt-repository ppa:dotnet/backports -y
              apt-get update
              apt-get install -y dotnet-sdk-10.0
          - artifact_name: uixe-copilot-agent-centos-stream-9-x64
            archive_name: uixe-copilot-agent-centos-stream-9-x64.tar.gz
            container_image: quay.io/centos/centos:stream9
            install_script: |
              dnf makecache
              dnf install -y ca-certificates clang gcc gcc-c++ tar gzip zlib-devel zlib-ng-devel zlib-ng-compat-devel
              dnf install -y dotnet-sdk-10.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Linux build image
        shell: bash
        env:
          CONTAINER_IMAGE: ${{ matrix.container_image }}
        run: docker pull "${CONTAINER_IMAGE}"

      - name: Publish Linux AOT
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          CONTAINER_IMAGE: ${{ matrix.container_image }}
          INSTALL_SCRIPT: ${{ matrix.install_script }}
        run: |
          set -euxo pipefail
          mkdir -p "artifacts/${ARTIFACT_NAME}"
          mkdir -p "artifacts"

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            "${CONTAINER_IMAGE}" \
            bash -s <<EOF
          set -euxo pipefail
          export DOTNET_CLI_HOME=/tmp
          ${INSTALL_SCRIPT}
          dotnet restore src/Uixe.Copilot.Agent/Uixe.Copilot.Agent.csproj -r linux-x64
          dotnet publish src/Uixe.Copilot.Agent/Uixe.Copilot.Agent.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishAot=true \
            -o /workspace/artifacts/${ARTIFACT_NAME}/publish
          chmod -R a+rwX /workspace/artifacts/${ARTIFACT_NAME}
          EOF

      - name: Archive Linux artifact
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
        run: |
          set -euxo pipefail
          tar -C "artifacts/${ARTIFACT_NAME}/publish" -czf "artifacts/${ARCHIVE_NAME}" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Attach Linux release asset
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
        run: gh release upload "${{ github.event.release.tag_name }}" "artifacts/${ARCHIVE_NAME}" --clobber
